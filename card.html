<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC's Anantha | Premium Business Card</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');

    :root {
        --navy-blue: #1c3d5f; 
        --gold-accent: #dca743; 
        --gold-light: #e6c57a;
        --white: #ffffff;
        --text-light: rgba(255, 255, 255, 0.8);
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f2f5;
        margin: 0;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .card-scene {
        width: 400px;
        height: 230px;
        perspective: 1000px;
        cursor: pointer;
    }

    .card {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        border-radius: 12px;
    }

    .card-scene:hover .card {
        transform: rotateY(180deg);
    }

    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(135deg, var(--navy-blue) 0%, #11263d 100%);
        border: 1px solid rgba(255,255,255,0.1);
    }

    /* Front of the Card */
    .card-front {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card-front::before {
        content: '';
        position: absolute;
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(220,167,67,0.05) 0%, transparent 60%);
        top: -25%;
        left: -25%;
    }

    .logo-container {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--white);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 20px rgba(220, 167, 67, 0.2);
        margin-bottom: 15px;
        overflow: hidden;
        border: 2px solid var(--gold-accent);
    }

    .logo-container img {
        width: 80%;
        height: auto;
    }

    .tagline {
        color: var(--gold-accent);
        font-size: 0.7rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
        margin: 0;
    }

    /* Back of the Card */
    .card-back {
        transform: rotateY(180deg);
        display: flex;
        flex-direction: row;
        background: url('data:image/svg+xml;utf8,<svg width="400" height="230" xmlns="http://www.w3.org/2000/svg"><path d="M400 0L0 230V0H400Z" fill="%2317324d"/></svg>') no-repeat;
        background-color: var(--navy-blue);
    }

    .left-section {
        flex: 1.1;
        padding: 30px 25px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-right: 1px solid rgba(220, 167, 67, 0.2);
    }

    .right-section {
        flex: 1;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px; /* Reduced gap slightly to fit 5 items */
    }

    .name {
        font-family: 'Playfair Display', serif;
        color: var(--white);
        font-size: 1.4rem;
        margin: 0 0 5px 0;
        letter-spacing: 0.5px;
    }

    .title {
        color: var(--gold-accent);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin: 0 0 20px 0;
        font-weight: 600;
    }

    .divider {
        width: 30px;
        height: 2px;
        background-color: var(--gold-accent);
        margin-bottom: 15px;
    }

    .company-name {
        font-family: 'Playfair Display', serif;
        color: var(--white);
        font-size: 1.1rem;
        margin: 0;
    }

    .contact-item {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-light);
        font-size: 0.7rem;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .contact-item:hover {
        color: var(--white);
    }

    .contact-icon {
        width: 13px;
        height: 13px;
        fill: var(--gold-accent);
        flex-shrink: 0;
    }

    .hover-hint {
        position: absolute;
        bottom: -30px;
        width: 100%;
        text-align: center;
        font-size: 0.8rem;
        color: #888;
    }
</style>
</head>
<body>

<div class="card-scene">
    <div class="card">
        <div class="card-face card-front">
            <div class="logo-container">
                <img src="https://i.img.it.com/YiwxUnuc/WhatsApp-Image-2026-04-20-at-19.52.50.jpg" alt="RC's Anantha Logo">
            </div>
            <p class="tagline">Premier Digital Agency</p>
        </div>

        <div class="card-face card-back">
            <div class="left-section">
                <h2 class="name">Chandan</h2>
                <p class="title">Founder</p>
                <div class="divider"></div>
                <h3 class="company-name">RC's Anantha</h3>
                <p style="color: var(--text-light); font-size: 0.65rem; margin: 5px 0 0 0;">Infinite Vision. Diverse Growth.</p>
            </div>
            
            <div class="right-section">
                <div class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                    +91 91485 29970

                    chandan@rcanantha.com
                </div>
                <div class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    rcanantha.com
                </div>
                <div class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    R C's ANANTHA
                </div>
                <div class="contact-item">
                    <svg class="contact-icon" viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25zM12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
                    @rc_anantha
                </div>
            </div>
        </div>
    </div>
    <div class="hover-hint">Hover to flip card</div>
</div>

</body>
</html>
